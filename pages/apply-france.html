    let currentLanguage = localStorage.getItem('language') || 'en';

    function toggleLanguageDropdown() {
        document.getElementById('langSelector').classList.toggle('active');
    }

    function changeLanguage(lang) {
        currentLanguage = lang;
        localStorage.setItem('language', lang);
        updateLanguageUI();
        document.getElementById('langSelector').classList.remove('active');
        applyTranslations();
        
        if (lang === 'ar') {
            document.body.setAttribute('dir', 'rtl');
            document.body.classList.add('arabic-text');
        } else {
            document.body.removeAttribute('dir');
            document.body.classList.remove('arabic-text');
        }
    }

    function updateLanguageUI() {
        const abbreviations = { en: 'EN', fr: 'FR', ar: 'AR' };
        document.getElementById('currentLangBtn').textContent = abbreviations[currentLanguage];
        document.querySelectorAll('.lang-option').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.lang === currentLanguage) btn.classList.add('active');
        });
    }

    function applyTranslations() {
        const texts = translations[currentLanguage];
        document.querySelectorAll('[data-translate]').forEach(el => {
            const key = el.dataset.translate;
            if (texts[key]) el.innerHTML = texts[key];
        });
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.language-selector')) {
            document.getElementById('langSelector').classList.remove('active');
        }
    });

    function toggleMobileMenu() {
        document.querySelector('.nav-links').classList.toggle('active');
    }

    function showFileName(input) {
        const files = Array.from(input.files);
        const display = input.closest('.file-upload').querySelector('.file-name');
        if (files.length > 0) {
            display.textContent = files.map(f => f.name).join(', ');
        } else {
            display.textContent = '';
        }
    }

    // AJAX Form Submission - NO REDIRECT
    document.getElementById('visaForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const texts = translations[currentLanguage];
        
        // Show loading state
        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${texts.btnSending}`;
        
        // Create FormData
        const formData = new FormData(this);
        
        try {
            // Submit via AJAX to prevent redirect
            const response = await fetch('https://formsubmit.co/ajax/raoufgrabsia@hotmail.com', {
                method: 'POST',
                body: formData
            });
            
            if (response.ok) {
                // Show success animation
                showSuccessMessage();
                // Reset form
                this.reset();
                document.querySelectorAll('.file-name').forEach(el => el.textContent = '');
            } else {
                throw new Error('Submission failed');
            }
        } catch (error) {
            alert('Error submitting form. Please try again or contact us via WhatsApp.');
            console.error('Form submission error:', error);
        } finally {
            // Reset button
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-paper-plane"></i> ${texts.btnSubmit}`;
        }
    });

    function showSuccessMessage() {
        const overlay = document.getElementById('successOverlay');
        overlay.classList.add('active');
        
        // Auto-close after 5 seconds
        setTimeout(() => {
            closeSuccessMessage();
        }, 5000);
    }

    function closeSuccessMessage() {
        const overlay = document.getElementById('successOverlay');
        overlay.style.opacity = '0';
        
        setTimeout(() => {
            overlay.classList.remove('active');
            overlay.style.opacity = '';
        }, 500);
    }

    // Close on background click
    document.getElementById('successOverlay').addEventListener('click', function(e) {
        if (e.target === this) {
            closeSuccessMessage();
        }
    });

    // Close on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeSuccessMessage();
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        updateLanguageUI();
        applyTranslations();
        if (currentLanguage === 'ar') {
            document.body.setAttribute('dir', 'rtl');
            document.body.classList.add('arabic-text');
        }
    });
</script>
